<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Etch-a-Sketch</title>
  </head>
  <body>
    <h1 id="title">Etch-a-Sketch</h1>
    <div id="input">
      <label for="grid-values"><b>Grid Values</b>:</label>
      <input id="row-input" type="number" required placeholder="Number of rows">
      <input id="column-input" type="number" required placeholder="Number of columns">
      <button id="go-button">Go</button>
    </div>
    <br>
    <div id="container"></div>
  </body>
</html>
